services:
  db:
    image: postgres:16-alpine
    container_name: 69-s2-db
    ports:
      - 54321:5432
    environment:
      - POSTGRES_PASSWORD=aom@1234
      - POSTGRES_USER=aom
      - POSTGRES_DB=aom

    admin:
      image: dpage/pgadmin4
      container_name: 69-s2-admin
      ports:
        - "8082:80"
      environment:
        - PGADMIN_DEFAULT_EMAIL=aom@admin.com
        - PGADMIN_DEFAULT_PASSWORD=aom@1234
      depends_on:
        - db
